  <script>
    (function () {
      const BASE = "https://play.google.com/apps/internaltest/4700382727885770321";

      // Read ?ref= from current URL (optional)
      const params = new URLSearchParams(window.location.search);
      const ref = params.get("ref");

      // Build destination (we keep it simple for internal test link)
      // Later, when you have the public Play Store URL, we'll pass ref properly.
      let dest = BASE;

      // Optional: keep ref visible for analytics logs later (for now just append)
      if (ref) {
        // Append as query parameter to keep it (harmless for now)
        dest = BASE + (BASE.includes("?") ? "&" : "?") + "ref=" + encodeURIComponent(ref);
      }

      // Give scrapers a tiny moment to read OG tags
      setTimeout(() => { window.location.replace(dest); }, 800);
    })();
  </script>
